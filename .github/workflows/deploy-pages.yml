name: Deploy web to GitHub Pages

# web/ 정적 프론트를 GitHub Pages로 배포한다.
# 사전 설정: 레포 Settings → Pages → Source 를 "GitHub Actions" 로 변경.

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
