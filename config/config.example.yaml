# 설정 예시. 실제 운영 설정은 config/config.yaml 로 복사해 채운다.
#   cp config/config.example.yaml config/config.yaml
# config/config.yaml 은 (실명 명단 등 개인정보 포함 가능) .gitignore 로 커밋 차단된다.
# 시크릿(Firebase 서비스계정 키)은 이 파일이 아니라 환경변수로 주입한다:
#   export FIREBASE_CREDENTIALS=/path/to/serviceAccount.json

source:
  name: thelifechurch-www56
  adapter: thelifechurch
  base_url: "http://www.thelifechurch.kr/main/sub.html?boardID=www56&Mode=list&keyfield=name&key="
  domain: "http://www.thelifechurch.kr"

collection:
  start_date: "2026.02.01"        # 이 날짜 이전 글은 수집 제외 (YYYY.MM.DD)
  request_delay_seconds: 1.0      # 작성자 요청 사이 지연(정중한 크롤링)
  user_agent: "jeja-pepero-monitor/0.1 (+운영자 연락처)"

# 추적할 작성자 명단 (예시 — 실제 명단은 config.yaml 에)
authors:
  - 홍길동
  - 김철수
  - 이영희

# 카테고리 규칙: 위에서부터 평가, 첫 매칭 적용. exclude=true 면 글을 버린다.
categories:
  - name: 공지(제외)
    exclude: true
    keywords: ["공지"]
  - name: QT
    keywords: ["큐티나눔"]
  - name: 기도제목
    keywords: ["기도"]
default_category: 기타

firebase:
  database_url: "https://jeja-pepero-default-rtdb.asia-southeast1.firebasedatabase.app"
  # 서비스계정 키 경로는 환경변수 FIREBASE_CREDENTIALS 로 주입(여기에 적지 않는다)
