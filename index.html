<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제자 페페로 · 큐티 모니터링</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <!-- 로딩 중 깜빡임 방지: JS가 세션 확인 후 화면을 결정 -->
  <div id="app" class="is-loading">

    <!-- ===================== 로그인 화면 ===================== -->
    <section id="login-view" class="view login-view" hidden>
      <div class="login-card">
        <h1 class="login-title">🥨 제자 페페로</h1>
        <p class="login-subtitle">큐티 모니터링 대시보드</p>

        <button id="google-login" type="button" class="btn btn-google">
          <svg class="g-icon" viewBox="0 0 18 18" aria-hidden="true">
            <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/>
            <path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.95H.96a9 9 0 0 0 0 8.1l3.01-2.33z"/>
            <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 9 0 9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/>
          </svg>
          Google 계정으로 로그인
        </button>

        <p id="login-error" class="login-error" role="alert" hidden></p>
      </div>
      <p class="login-foot">접근 권한이 있는 계정만 로그인할 수 있습니다.</p>
    </section>

    <!-- ===================== 메인 화면 ===================== -->
    <section id="main-view" class="view main-view" hidden>
      <header class="topbar">
        <button id="sidebar-toggle" class="hamburger" type="button" aria-label="메뉴 열기">☰</button>
        <div class="topbar-brand">🥨 제자 페페로 <span class="topbar-sub">큐티 모니터링</span></div>
        <div class="topbar-user">
          <span id="user-name" class="user-name"></span>
          <button id="refresh-btn" type="button" class="btn btn-ghost" title="데이터 새로고침">↻ 새로고침</button>
          <button id="logout-btn" type="button" class="btn btn-ghost">로그아웃</button>
        </div>
      </header>

      <!-- 접이식 사이드바 (대시보드 + 멤버별) -->
      <aside id="sidebar" class="sidebar" aria-label="화면 전환">
        <div class="sidebar-head">메뉴</div>
        <nav id="tabs" class="side-nav"></nav>
      </aside>
      <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

      <!-- 권한/오류 안내 배너 -->
      <div id="notice" class="notice" hidden></div>

      <main class="content">
        <!-- ===== 대시보드 ===== -->
        <div id="dashboard-view">
          <!-- 이번 달 큐티 완주 현황 -->
          <section class="card">
            <div class="card-head">
              <h2 id="qt-title">📊 이번 달 큐티 완주 현황</h2>
              <span id="qt-meta" class="card-meta"></span>
            </div>
            <div id="qt-table-wrap" class="table-wrap">
              <p class="muted" id="qt-loading">불러오는 중…</p>
            </div>
          </section>

          <!-- 최근 수집된 글 -->
          <section class="card">
            <div class="card-head">
              <h2>🆕 최근 수집된 글</h2>
              <span class="card-meta">최근 20건</span>
            </div>
            <div id="feed-wrap">
              <p class="muted" id="feed-loading">불러오는 중…</p>
            </div>
          </section>
        </div>

        <!-- ===== 멤버별 글 ===== -->
        <div id="member-view" hidden>
          <section class="card">
            <div class="card-head">
              <h2 id="member-title"></h2>
              <span id="member-meta" class="card-meta"></span>
            </div>
            <div id="cat-filter" class="chips"></div>
            <div id="member-posts"></div>
          </section>
        </div>
      </main>

      <!-- 글 보기 모달 -->
      <div id="post-modal" class="modal" hidden>
        <div class="modal-box" role="dialog" aria-modal="true">
          <button id="modal-close" class="modal-close" type="button" aria-label="닫기">✕</button>
          <div class="modal-head">
            <span id="modal-cat" class="post-cat"></span>
            <h3 id="modal-title"></h3>
            <div id="modal-meta" class="card-meta"></div>
          </div>
          <div id="modal-body" class="modal-body"></div>
          <div class="modal-foot">
            <a id="modal-link" href="#" target="_blank" rel="noopener">원문 열기 ↗</a>
          </div>
        </div>
      </div>
    </section>

  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
