<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Life 훈련 모니터링</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <!-- 로딩 중 깜빡임 방지: JS가 세션 확인 후 화면을 결정 -->
  <div id="app" class="is-loading">

    <!-- ===================== 로그인 화면 ===================== -->
    <section id="login-view" class="view login-view" hidden>
      <div class="login-card">
        <h1 class="login-title">🥨 The Life</h1>
        <p class="login-subtitle">훈련 모니터링</p>

        <form id="login-form" class="login-form">
          <label class="login-label" for="class-select">훈련 반</label>
          <select id="class-select" class="login-select" required>
            <option value="" disabled selected>불러오는 중…</option>
          </select>

          <label class="login-label" for="class-password">비밀번호</label>
          <input id="class-password" class="login-input" type="password"
                 autocomplete="current-password" placeholder="반 비밀번호" required />

          <button id="class-login" type="submit" class="btn btn-primary btn-login">로그인</button>
        </form>

        <p id="login-error" class="login-error" role="alert" hidden></p>
      </div>
      <p class="login-foot">반을 선택하고 관리자에게 받은 비밀번호로 로그인하세요.</p>
    </section>

    <!-- ===================== 메인 화면 ===================== -->
    <section id="main-view" class="view main-view" hidden>
      <header class="topbar">
        <button id="sidebar-toggle" class="hamburger" type="button" aria-label="메뉴 열기">☰</button>
        <div class="topbar-brand">🥨 The Life <span class="topbar-sub">훈련 모니터링</span></div>
        <div class="topbar-user">
          <span id="user-name" class="user-name"></span>
          <button id="logout-btn" type="button" class="btn btn-ghost">로그아웃</button>
        </div>
      </header>

      <!-- 접이식 사이드바 (대시보드 + 멤버별) -->
      <aside id="sidebar" class="sidebar" aria-label="화면 전환">
        <div class="sidebar-head">메뉴</div>
        <nav id="tabs" class="side-nav"></nav>
      </aside>
      <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

      <!-- 권한/오류 안내 배너 -->
      <div id="notice" class="notice" hidden></div>

      <main class="content">
        <!-- ===== 대시보드 ===== -->
        <div id="dashboard-view">
          <!-- 이번 달 큐티 완주 현황 -->
          <section class="card">
            <div class="card-head">
              <h2 id="qt-title">📊 이번 달 큐티 완주 현황</h2>
              <div class="qt-head-right">
                <select id="qt-month" class="qt-month" aria-label="월 선택"></select>
                <span id="qt-meta" class="card-meta"></span>
              </div>
            </div>
            <div id="qt-table-wrap" class="table-wrap">
              <p class="muted" id="qt-loading">불러오는 중…</p>
            </div>
          </section>

          <!-- 과제 완주 현황 -->
          <section class="card">
            <div class="card-head">
              <h2 id="assign-title">📝 과제 완주 현황</h2>
              <span id="assign-meta" class="card-meta"></span>
            </div>
            <div id="assign-table-wrap" class="table-wrap">
              <p class="muted">불러오는 중…</p>
            </div>
          </section>

          <!-- 최근 수집된 글 -->
          <section class="card">
            <div class="card-head">
              <h2>🆕 최근 수집된 글</h2>
              <span class="card-meta">최근 20건</span>
            </div>
            <div id="feed-wrap">
              <p class="muted" id="feed-loading">불러오는 중…</p>
            </div>
          </section>
        </div>

        <!-- ===== 멤버별 글 ===== -->
        <div id="member-view" hidden>
          <section class="card">
            <div class="card-head">
              <h2 id="member-title"></h2>
              <span id="member-meta" class="card-meta"></span>
            </div>
            <div id="cat-filter" class="chips"></div>
            <div id="member-posts"></div>
          </section>
        </div>

        <!-- ===== 멤버 관리 (관리자) ===== -->
        <div id="admin-view" hidden></div>
      </main>

      <!-- 주차별 큐티 글 목록 모달 -->
      <div id="week-modal" class="modal" hidden>
        <div class="modal-box" role="dialog" aria-modal="true">
          <button id="week-modal-close" class="modal-close" type="button" aria-label="닫기">✕</button>
          <div class="modal-head">
            <h3 id="week-modal-title"></h3>
            <div id="week-modal-meta" class="card-meta"></div>
          </div>
          <div id="week-modal-body" class="modal-list"></div>
        </div>
      </div>

      <!-- 글 보기 모달 -->
      <div id="post-modal" class="modal" hidden>
        <div class="modal-box" role="dialog" aria-modal="true">
          <button id="modal-close" class="modal-close" type="button" aria-label="닫기">✕</button>
          <div class="modal-head">
            <span id="modal-cat" class="post-cat"></span>
            <h3 id="modal-title"></h3>
            <div id="modal-meta" class="card-meta"></div>
          </div>
          <div id="modal-body" class="modal-body"></div>
          <div class="modal-foot">
            <a id="modal-link" href="#" target="_blank" rel="noopener">원문 열기 ↗</a>
          </div>
        </div>
      </div>
    </section>

  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
